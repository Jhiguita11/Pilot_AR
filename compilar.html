<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compilar marcador · targets.mind</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    button { background: #111; color: #fff; border: 0; padding: 12px 22px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:disabled { opacity: .5; cursor: default; }
    .bar { height: 10px; background: #eee; border-radius: 6px; overflow: hidden; margin: 16px 0; }
    .bar > i { display: block; height: 100%; width: 0; background: #111; transition: width .2s; }
    img { max-width: 220px; border: 1px solid #ddd; border-radius: 8px; margin-top: 12px; }
    code { background: #f3f3f3; padding: 2px 6px; border-radius: 4px; }
    .ok { color: #0a7d2c; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Paso 1 · Compilar el marcador</h1>
  <p>Esto convierte <code>escaneo.jpg</code> en <code>targets.mind</code>, el archivo que la cámara
     usa para reconocer el boceto. Solo se hace una vez.</p>
  <img id="preview" src="./escaneo.jpg" alt="imagen a compilar" />
  <div class="bar"><i id="prog"></i></div>
  <button id="go">Compilar y descargar targets.mind</button>
  <p id="status"></p>
  <p>Cuando descargue, deja <code>targets.mind</code> en la misma carpeta que <code>index.html</code>.</p>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script>
    const btn = document.getElementById('go');
    const prog = document.getElementById('prog');
    const status = document.getElementById('status');

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      status.textContent = 'Cargando imagen…';
      try {
        const img = await loadImage('./escaneo.jpg');
        status.textContent = 'Compilando… (puede tardar unos segundos)';
        const compiler = new window.MINDAR.IMAGE.Compiler();
        await compiler.compileImageTargets([img], (p) => {
          prog.style.width = p.toFixed(1) + '%';
        });
        const buffer = await compiler.exportData();
        download(buffer, 'targets.mind');
        prog.style.width = '100%';
        status.innerHTML = '<span class="ok">¡Listo!</span> Se descargó <code>targets.mind</code>. Colócalo junto a index.html.';
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
        btn.disabled = false;
      }
    });

    function loadImage(src) {
      return new Promise((res, rej) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => res(img);
        img.onerror = rej;
        img.src = src;
      });
    }
    function download(buffer, name) {
      const blob = new Blob([buffer]);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name;
      a.click();
    }
  </script>
</body>
</html>
