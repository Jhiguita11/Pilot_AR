<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Revelación AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; font-family:system-ui,sans-serif; background:#000; }

    /* El lienzo de A-Frame debe ser transparente para ver el vídeo de la cámara
       (que MindAR pone por detrás). En iOS hay que forzarlo. */
    canvas.a-canvas, .a-canvas { background:transparent !important; }

    /* Capa de inicio: toda la pantalla es el disparador (iOS exige un toque) */
    #tapStart {
      position:fixed; inset:0; z-index:30; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px; text-align:center;
      color:#fff; padding:32px; background:radial-gradient(circle at 50% 30%, #1c2530, #05080c);
      transition:opacity .4s; cursor:pointer;
    }
    #tapStart img { width:130px; border-radius:10px; box-shadow:0 8px 30px rgba(0,0,0,.5); }
    #tapStart h1 { font-size:1.4rem; }
    #tapStart p { font-size:.95rem; opacity:.85; max-width:300px; line-height:1.5; }
    #tapStart .cta {
      margin-top:6px; background:#fff; color:#111; padding:14px 30px; border-radius:999px;
      font-size:1.05rem; font-weight:700;
    }

    #status {
      position:fixed; left:8px; right:8px; bottom:8px; z-index:25; text-align:center;
      font-size:.78rem; color:#fff; background:rgba(0,0,0,.5); padding:8px 12px;
      border-radius:8px; backdrop-filter:blur(6px); display:none;
    }
  </style>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights, alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">
    <a-assets>
      <img id="card" src="./revelacion.jpg" crossorigin="anonymous" />
    </a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-plane id="reveal" src="#card" position="0 0 0" rotation="0 0 0" width="1" height="0.664"></a-plane>
    </a-entity>
  </a-scene>

  <div id="tapStart">
    <img src="./revelacion.jpg" alt="vista previa" />
    <h1>Descubre la imagen oculta</h1>
    <p>Toca la pantalla, permite la cámara y apunta al boceto.</p>
    <div class="cta">Tocar para empezar</div>
  </div>
  <div id="status"></div>

  <script>
    const scene = document.querySelector('a-scene');
    const tapStart = document.getElementById('tapStart');
    const statusEl = document.getElementById('status');
    const target = document.getElementById('target');
    let found = false, started = false, overlayHidden = false;

    function setStatus(m){ statusEl.style.display='block'; statusEl.textContent = m; }
    function hideOverlay(){ if(overlayHidden) return; overlayHidden=true; tapStart.style.opacity='0'; setTimeout(()=>tapStart.style.display='none',400); }

    // El toque (gesto de usuario, obligatorio en iOS) arranca la cámara
    function begin(){
      if (started) return; started = true;
      setStatus('⏳ pidiendo permiso de cámara…');
      const go = () => {
        const sys = scene.systems['mindar-image-system'];
        if (!sys){ setStatus('❌ MindAR no cargó (revisa la conexión).'); return; }
        sys.start();
      };
      if (scene.hasLoaded) go();
      else scene.addEventListener('loaded', go, { once:true });
    }
    tapStart.addEventListener('click', begin);

    // Arreglo iOS (muted property + play) + estado/diagnóstico en pantalla
    setInterval(() => {
      if (!started) return;
      const vid = document.querySelector('video');
      if (!vid){ setStatus('⏳ iniciando cámara…'); return; }
      vid.muted = true; vid.defaultMuted = true;
      vid.setAttribute('playsinline',''); vid.setAttribute('webkit-playsinline','');
      if (vid.paused) vid.play().catch(()=>{});
      if (vid.videoWidth === 0){
        setStatus('⏳ cámara activa, esperando imagen (0×0)…');
      } else {
        hideOverlay();
        setStatus(found
          ? '✅ ¡boceto detectado! · vídeo ' + vid.videoWidth + '×' + vid.videoHeight
          : '🔍 buscando el boceto… · vídeo ' + vid.videoWidth + '×' + vid.videoHeight);
      }
    }, 600);

    target.addEventListener('targetFound', () => { found = true; });
    target.addEventListener('targetLost',  () => { found = false; });
    window.addEventListener('error', e => setStatus('❌ ' + e.message));
  </script>
</body>
</html>
